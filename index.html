<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dathwik Kollikonda — Frontend & Web Developer. Building clean, fast, and accessible web experiences." />
    <meta property="og:title" content="Dathwik Kollikonda — Frontend Developer" />
    <meta property="og:description" content="Portfolio of Dathwik Kollikonda, Frontend & Web Developer." />

  <body>
    <div id="root">
      <style>
        #initial-loader {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #08000f;
          background-image:
            linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
          background-size: 40px 40px;
        }
        #initial-loader p {
          font-family: monospace;
          font-size: 0.85rem;
          letter-spacing: 0.3em;
          text-transform: uppercase;
          color: #ffffff;
          text-shadow: 0 0 8px #ff2d78, 0 0 20px #ff2d78;
          animation: neon-blink 1.2s ease-in-out infinite;
        }
        @keyframes neon-blink {
          0%, 100% { opacity: 1; text-shadow: 0 0 8px #ff2d78, 0 0 20px #ff2d78, 0 0 40px #ff2d78; }
          50%       { opacity: 0.5; text-shadow: 0 0 4px #ff2d78, 0 0 10px #ff2d78; }
        }
      </style>
      <div id="initial-loader">
        <p>&gt; Loading_</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
